name: "🐛 Bug Report"
description: Report a bug or unexpected behavior.
title: "fix: "
labels: ["type: fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Type '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual outcome (include console errors if any).
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details (OS, extension version, website URL).
      placeholder: "OS: Windows 11, Extension: v1.2.3, Website: chatgpt.com"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Console Logs
      description: Attach screenshots or paste relevant console output.
      placeholder: Paste logs or drag & drop screenshots.
    validations:
      required: false
