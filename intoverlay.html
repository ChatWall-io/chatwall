<div id="cwio-shell">

    <!-- ── Top bar ───────────────────────────────────────────────────────── -->
    <div id="cwio-topbar">
        <div id="cwio-brand">
            <img src="logo.svg" alt="">
            <span>ChatWall</span>
        </div>

        <div id="cwio-tools">
            <button id="cwio-mask" type="button" class="cwio-btn" title="{{MSG_help_custom_tool_mask}}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                <span>{{MSG_btn_mask}}</span>
            </button>

            <button id="cwio-unmask" type="button" class="cwio-btn" title="{{MSG_help_custom_tool_unmask}}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
                    <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
                <span>{{MSG_btn_unmask}}</span>
            </button>

            <button id="cwio-fav" type="button" class="cwio-btn btn-fav" title="{{MSG_ctx_add_fav}}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" />
                </svg>
            </button>

            <div class="cwio-sep"></div>

            <button id="cwio-expand" type="button" class="cwio-btn btn-exp" title="{{MSG_btn_expand_overlay}}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
                </svg>
            </button>

            <div class="cwio-sep"></div>

            <button id="cwio-send" type="button" class="cwio-btn btn-send" title="{{MSG_btn_send_masked}}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
                <span>{{MSG_btn_send_masked}}</span>
            </button>

            <div class="cwio-sep"></div>

            <button id="cwio-settings" type="button" class="cwio-btn" title="{{MSG_menu_settings}}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
            </button>

            <button id="cwio-close" type="button" class="cwio-btn btn-close" title="{{MSG_btn_close}}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </div>


    <!-- ── Free-tier warning (JS toggles .visible when premium tokens found) -->
    <div id="cwio-warn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span>{{MSG_intoverlay_warn_msg}} <strong>Premium</strong> {{MSG_intoverlay_warn_msg2}}
            <a id="cwio-upgrade-link" href="https://chatwall.io/pricing" target="_blank"
                style="color:#fde68a;text-decoration:underline;cursor:pointer;">{{MSG_btn_upgrade}} ↗</a>
        </span>
    </div>

    <!-- ── Editor ─────────────────────────────────────────────────────────── -->
    <div id="cwio-editor">
        <div id="cwio-hl" class="cwio-layer"></div>
        <textarea id="cwio-ta" class="cwio-layer" spellcheck="false"
            placeholder="{{MSG_placeholder_prompt}}"></textarea>
    </div>
    <!-- Hidden output sink: finalizeProcessing writes masked tokens here,
         sendMasked reads .textContent — no duplicate masking logic needed. -->
    <div id="cwio-out" style="display:none;white-space:pre-wrap"></div>

</div>
